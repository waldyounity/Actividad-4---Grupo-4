<!-- tareas.html -->
{% extends "plantilla.html" %}

{% block contenido %}
<h2>Listado de Tareas</h2>

{% if tareas %}
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for tarea in tareas %}
            <tr>
                <td>{{ tarea.id }}</td>
                <td>{{ tarea.titulo }}</td>
                <td>
                    <a href="{{ url_for('mostrar_tarea', id=tarea.id) }}">Ver Detalles</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>No hay tareas registradas.</p>
{% endif %}

<br>
<a href="{{ url_for('nosotros') }}">Agregar Nueva Tarea</a>
{% endblock %}
